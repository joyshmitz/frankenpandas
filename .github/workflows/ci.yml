name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly + rustfmt)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          components: rustfmt

      - name: Format check
        run: cargo fmt --check

  lint:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        features:
          - ""                        # default features
          - "--no-default-features"   # minimum-viable build
          - "--all-features"          # every feature on (asupersync etc.)
        include:
          # Windows: single default-feature build surfacing path /
          # newline / toolchain regressions without the full 3x feature
          # fan-out. Per br-frankenpandas-0l5r incremental step 2: add
          # windows `cargo check` coverage before committing to full
          # IO-suite on that runner.
          - os: windows-latest
            features: ""
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly + clippy/rust-src)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}
          components: clippy, rust-src

      - name: Check
        run: cargo check --all-targets ${{ matrix.features }}

      - name: Clippy
        run: cargo clippy --all-targets ${{ matrix.features }} -- -D warnings

      - name: Rustdoc
        if: matrix.features == '--all-features'
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --all-features

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target
      TMPDIR: ${{ github.workspace }}/.tmp
      FP_PYTHON_BIN: python
      FP_REQUIRE_LIVE_ORACLE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create temp dirs
        run: mkdir -p .tmp .target

      - name: Install pinned pandas oracle dependency
        run: python -m pip install --upgrade pip -r crates/fp-conformance/oracle/requirements.txt

      - name: Workspace tests
        run: cargo test --workspace

      - name: Doctest (--doc)
        # Per br-frankenpandas-ddox: `cargo test --workspace` does NOT
        # execute doctests by default. Run them explicitly so the 8
        # (growing) doctests across frankenpandas / fp-index / fp-columnar
        # stay exercised on every PR and don't rot into broken docs.rs
        # builds at release time.
        run: cargo test --doc --workspace

  conformance:
    runs-on: ubuntu-latest
    needs: [test]
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target-conformance
      TMPDIR: ${{ github.workspace }}/.tmp
      FP_PYTHON_BIN: python
      FP_REQUIRE_LIVE_ORACLE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create temp dirs
        run: mkdir -p .tmp .target-conformance

      - name: Install pinned pandas oracle dependency
        run: python -m pip install --upgrade pip -r crates/fp-conformance/oracle/requirements-dev.txt

      - name: Oracle pytest suite
        # Per br-frankenpandas-urhy: the 4985-LOC pandas_oracle.py is the
        # conformance spec's "source of truth". Running its pytest suite
        # before the cargo conformance tests catches oracle-side
        # normalize_* / dispatch regressions that would otherwise silently
        # corrupt every generated fixture.
        run: python -m pytest crates/fp-conformance/oracle/tests/ -v

      - name: Fixture freshness
        run: ./scripts/check_fixture_freshness.sh

      - name: Conformance tests
        run: cargo test -p fp-conformance -- --nocapture

      - name: Performance regression gate
        run: cargo test -p fp-conformance --test perf_baselines -- --nocapture --ignored --skip perf_run_all_baselines

  gates:
    runs-on: ubuntu-latest
    needs: [conformance]
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target-gates
      TMPDIR: ${{ github.workspace }}/.tmp
      FP_PYTHON_BIN: python
      FP_REQUIRE_LIVE_ORACLE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Create temp dirs
        run: mkdir -p .tmp .target-gates

      - name: Install pinned pandas oracle dependency
        run: python -m pip install --upgrade pip -r crates/fp-conformance/oracle/requirements.txt

      - name: Phase2C gate check
        run: ./scripts/phase2c_gate_check.sh

      - name: CI gate topology (G1..G8) + forensics
        if: always()
        run: |
          mkdir -p artifacts/ci
          cargo run -p fp-conformance --bin fp-ci-gates -- \
            --pipeline full \
            --no-fail-fast \
            --no-verify-sidecars \
            --json-out artifacts/ci/gate_forensics.json

      - name: Upload gate forensics artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ci-gate-forensics
          path: |
            artifacts/ci/gate_forensics.json
            artifacts/ci/live_oracle_report.json
          if-no-files-found: warn

      - name: Total-parity governance gate
        if: always()
        run: ./scripts/governance_gate_check.sh

      - name: Upload governance gate artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: governance-gate-report
          path: artifacts/ci/governance_gate_report.json
          if-no-files-found: warn

  security:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: RustSec advisory audit
        run: cargo audit --deny warnings

      - name: Install cargo-machete
        run: cargo install cargo-machete --locked

      - name: Unused dependency audit
        run: cargo machete

  licenses:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/.target-deny
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: License and source policy audit
        run: cargo deny check advisories bans licenses sources

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  fuzz-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CARGO_TERM_COLOR: always
      CARGO_TARGET_DIR: ${{ github.workspace }}/fuzz/.target
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve pinned Rust toolchain
        id: rust_toolchain
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib

          with open("rust-toolchain.toml", "rb") as fh:
              print(f"channel={tomllib.load(fh)['toolchain']['channel']}")
          PY

      - name: Setup Rust (pinned nightly)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.rust_toolchain.outputs.channel }}

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Fuzz regression corpus
        working-directory: fuzz
        run: |
          set -euo pipefail
          targets="$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "fp-fuzz") | .targets[] | select(.kind[] == "bin") | .name')"
          for target in $targets; do
            mkdir -p "artifacts/$target"
            cargo fuzz run "$target" "corpus/$target" -- \
              -runs=1000 \
              -rss_limit_mb=512 \
              -timeout=60 \
              -artifact_prefix="artifacts/$target/"
          done

      - name: Upload fuzz artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-regression-artifacts
          path: fuzz/artifacts
          if-no-files-found: warn
